# New Generic template 
# version 0.0.1

aac flc * *
	# IFD:{RESAMPLE=--maxSampleRate=%d}
	[faad] -q -w -f 2 $FILE$ | [SqueezeDSP] --bitsin=$SAMPLESIZE$ --samplerate=$SAMPLERATE$ --be=false --channels=$CHANNELS$ --formatin=PCM --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC

aif flc * *
	# IFD:{RESAMPLE=--maxSampleRate=%d}
	[SqueezeDSP] --input $FILE$ --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC 

alc flc * *
	# FT:{START=-j %s}U:{END=-e %u}D:{RESAMPLE=-r %d}
	[faad] -q -w -f 1 $START$ $END$ $FILE$ | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC

alcx flc * *
	# FT:{START=-j %s}U:{END=-e %u}D:{RESAMPLE=-r %d}
	[faad] -q -w -f 1 $START$ $END$ $FILE$  | [SqueezeDSP]  --trackURL=$URL$ $RESAMPLE$  --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC

ape flc * *
	# FD:{RESAMPLE=-r %d}
	[mac] $FILE$ - -d | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC

dsf flc * *
	# FT:{START=-ss %s}U:{END=-to %u}D:{RESAMPLE=--maxSampleRate=%d}
	[ffmpeg] -loglevel quiet $START$ -i $FILE$  $END$ -ar 384000 -f wav - | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC 

dff flc * *
	# FT:{START=-ss %s}U:{END=-to %u}D:{RESAMPLE=--maxSampleRate=%d}
	[ffmpeg] -loglevel quiet $START$ -i $FILE$ $END$ -ar 384000 -f wav - | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC 

flc flc * *
	# IFT:{START=--skip=%t}U:{END=--until=%v}D:{RESAMPLE=--maxSampleRate=%d}
	[flac] -dcs --force-raw-format --endian=little --sign=signed $START$ $END$ -- $FILE$ | [SqueezeDSP] --bitsin=$SAMPLESIZE$ --samplerate=$SAMPLERATE$ --channels=$CHANNELS$ --formatin=PCM --trackURL=$URL$ --Clientid=$CLIENTID$ $RESAMPLE$ --bitsout=24 --formatout=FLC

hls flc * *
	# RB:{BITRATE=-B %B}T:{START=-ss %s}D:{RESAMPLE=--maxSampleRate=%d}
	[ffmpeg] -loglevel quiet  -i $FILE$ -f s24le - | [SqueezeDSP] --bitsin=$SAMPLESIZE$ --samplerate=$SAMPLERATE$ --channels=$CHANNELS$ --formatin=PCM  --trackURL=$URL$ $RESAMPLE$  --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

mov flc * *
	# FRD:{RESAMPLE=--maxSampleRate=%d}
	[mov123] $FILE$ | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC

mp3 flc * *
	# IF
	[lame] --mp3input --decode --silent $FILE$ - | [SqueezeDSP] --trackURL=$URL$ --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

mp4 flc * *
	# FT:{START=-j %s}U:{END=-e %u}D:{RESAMPLE=--maxSampleRate=%d}
	[faad] -q -w -f 1 $START$ $END$ $FILE$ | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$  --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

mp4x flc  * *
	# FT:{START=-j %s}U:{END=-e %u}D:{RESAMPLE=--maxSampleRate=%d}
	[faad] -q -w -f 1 $START$ $END$ $FILE$  | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$  --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

mpc flc * *
	# IRD:{RESAMPLE=--maxSampleRate=%d}
	[mppdec] --silent --prev --gain 3 - - | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

ogg flc * *
	# IFRD:{RESAMPLE=--maxSampleRate=%d}
	[sox] -t ogg $FILE$ -t wav - | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

ogf flc * *
	# IFRD:{RESAMPLE=--maxSampleRate=%d}
	[flac] --ogg -dcs --force-raw-format --endian=little --sign=signed  -- $FILE$ | [SqueezeDSP] --bitsin=$SAMPLESIZE$ --samplerate=$SAMPLERATE$ --be=false --channels=$CHANNELS$ --formatin=PCM --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

ops flc * *
	# IFB:{BITRATE=--abr %B}D:{RESAMPLE=--maxSampleRate=%d}
	[sox] -q -t opus $FILE$ -t wav - | [SqueezeDSP]  --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

spt flc * *
	# RT:{START=--start-position %s}
	[spotty] -n Squeezebox -c "$CACHE$" --single-track $URL$ --bitrate 320 --disable-discovery --disable-audio-cache $START$  | [SqueezeDSP] --bitsin=$SAMPLESIZE$ --samplerate=$SAMPLERATE$ --be=false --channels=$CHANNELS$ --formatin=PCM  --trackURL=$URL$ --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC

wav flc * *
	# IFD:{RESAMPLE=--maxSampleRate=%d}
	[SqueezeDSP] --input $FILE$ --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC 

wma flc * *
	# FT:{START=-ss %t}U:{END=-to %v}D:{RESAMPLE=--maxSampleRate=%d}
	[ffmpeg] -loglevel quiet $START$ -i $FILE$ $END$ -f s24le - | [SqueezeDSP] --bitsin=24 --samplerate=$SAMPLERATE$ --be=false --channels=$CHANNELS$ --formatin=PCM --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC

wmal flc * *
	# FT:{START=-ss %t}U:{END=-to %v}D:{RESAMPLE=--maxSampleRate=%d}
	[ffmpeg] -loglevel quiet $START$ -i $FILE$ $END$ -f s24le - | [SqueezeDSP] --bitsin=24 --samplerate=$SAMPLERATE$ --be=false --channels=$CHANNELS$ --formatin=PCM --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC

wmap flc * *
	# FT:{START=-ss %t}U:{END=-to %v}D:{RESAMPLE=--maxSampleRate=%d}
	[ffmpeg] -loglevel quiet $START$ -i $FILE$ $END$ -f s24le - | [SqueezeDSP] --bitsin=24 --samplerate=$SAMPLERATE$ --be=false --channels=$CHANNELS$ --formatin=PCM --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$ --bitsout=24 --formatout=FLC


wvp flc * *
	# FT:{START=--skip=%t}U:{END=--until=%v}D:{RESAMPLE=--maxSampleRate=%d}
	[wvunpack] $FILE$ -wq $START$ $END$ -o - | [SqueezeDSP] --trackURL=$URL$ $RESAMPLE$ --Clientid=$CLIENTID$  --bitsout=24 --formatout=FLC


